<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤</title>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    display: flex;
  }

  .scene {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a0a12 0%, #0d0610 45%, #050308 100%);
    overflow: hidden;
  }

  /* 背景柔光 */
  .glow {
    position: absolute;
    width: min(90vw, 62vh);
    height: min(90vw, 62vh);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 60, 90, 0.35) 0%, rgba(255, 40, 70, 0.08) 45%, transparent 70%);
    animation: glow-pulse 1.2s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes glow-pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    14%       { transform: scale(1.18); opacity: 1; }
    28%       { transform: scale(1); opacity: 0.75; }
    42%       { transform: scale(1.12); opacity: 0.95; }
    70%       { transform: scale(1); opacity: 0.7; }
  }

  /* 心形容器 */
  .heart-wrap {
    position: relative;
    height: 50vh;
    width: calc(50vh * 100 / 90);
    animation: heartbeat 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 2.5vh rgba(255, 50, 80, 0.65))
            drop-shadow(0 0 5vh rgba(255, 30, 60, 0.35));
  }

  .heart {
    display: block;
    width: 100%;
    height: 100%;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14%       { transform: scale(1.15); }
    28%       { transform: scale(1); }
    42%       { transform: scale(1.08); }
    70%       { transform: scale(1); }
  }

  .caption {
    position: absolute;
    bottom: 18vh;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255, 180, 195, 0.9);
    font-size: clamp(16px, 3.5vw, 24px);
    letter-spacing: 0.2em;
    z-index: 2;
  }

  /* 漂浮粒子 */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    bottom: 45%;
    left: 50%;
    width: 6px;
    height: 6px;
    background: rgba(255, 100, 130, 0.8);
    border-radius: 50%;
    opacity: 0;
    animation: float-up 3s ease-out infinite;
  }

  .particle:nth-child(1)  { animation-delay: 0s;    margin-left: -30px; width: 5px; height: 5px; }
  .particle:nth-child(2)  { animation-delay: 0.6s;  margin-left:  20px; width: 4px; height: 4px; }
  .particle:nth-child(3)  { animation-delay: 1.2s;  margin-left: -10px; width: 6px; height: 6px; }
  .particle:nth-child(4)  { animation-delay: 1.8s;  margin-left:  35px; width: 3px; height: 3px; }
  .particle:nth-child(5)  { animation-delay: 2.4s;  margin-left: -45px; width: 4px; height: 4px; }

  @keyframes float-up {
    0%   { transform: translateY(0) scale(1);   opacity: 0; }
    15%  { opacity: 0.9; }
    100% { transform: translateY(-180px) scale(0.2); opacity: 0; }
  }
  </style>
</head>
<body>
  <div class="scene">
    <div class="glow" aria-hidden="true"></div>

    <div class="heart-wrap" aria-label="心形">
      <svg class="heart" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="heartFill" cx="38%" cy="28%" r="75%">
            <stop offset="0%" stop-color="#ff7a96"/>
            <stop offset="100%" stop-color="#e8003a"/>
          </radialGradient>
        </defs>
        <path fill="url(#heartFill)" d="M50,85 C22,62 2,48 2,28 C2,10 16,2 30,2 C40,2 46,10 50,20 C54,10 60,2 70,2 C84,2 98,10 98,28 C98,48 78,62 50,85 Z"/>
      </svg>
    </div>

    <p class="caption">唯欣主义</p>

    <div class="particles" aria-hidden="true">
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
    </div>
  </div>
</body>
</html>
